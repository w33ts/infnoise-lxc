name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck ct/infnoise-trng.sh install/infnoise-trng-install.sh scripts/release-package.sh

      - name: Verify release package
        run: scripts/release-package.sh test-build
